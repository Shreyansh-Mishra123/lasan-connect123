<!DOCTYPE html>
<html lang="en" class="h-full">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        .view-pane { display: none; }
        .view-pane.active { display: block; }
        body { background-color: #000000; }
        /* Remove number input arrows */
        input[type=number]::-webkit-inner-spin-button,
        input[type=number]::-webkit-outer-spin-button { -webkit-appearance: none; margin: 0; }
        input[type=number] { -moz-appearance: textfield; }
    </style>
</head>
<body class="h-full text-white font-sans flex overflow-hidden">

    <!-- Sidebar -->
    <aside class="w-64 bg-[#111111] border-r border-[#222222] flex flex-col shrink-0">
        <div class="h-16 flex items-center px-6 border-b border-[#222222] bg-[#000000]/40">
            <div class="h-8 w-8 bg-white rounded-full flex items-center justify-center mr-3">
                <i class="fa-solid fa-shield-halved text-black text-sm"></i>
            </div>
            <div>
                <h1 class="text-sm font-bold text-white tracking-tight">LasanPortal</h1>
                <p class="text-[9px] text-gray-400 font-bold uppercase tracking-wider">Terminal Root</p>
            </div>
        </div>
        <nav class="flex-1 p-4 space-y-2">
            <button onclick="showView('ops', this)" class="nav-btn w-full flex items-center gap-3 px-4 py-3 bg-[#1a1a1a] text-white rounded-xl font-bold text-xs border border-[#333333]">
                <i class="fa-solid fa-upload w-4"></i> Upload to Store
            </button>
            <button onclick="showView('users', this)" class="nav-btn w-full flex items-center gap-3 px-4 py-3 text-gray-400 hover:bg-[#1a1a1a] hover:text-white rounded-xl font-bold text-xs transition border border-transparent hover:border-[#333333]">
                <i class="fa-solid fa-users w-4"></i> User Management
            </button>
            <button onclick="showView('repo', this)" class="nav-btn w-full flex items-center gap-3 px-4 py-3 text-gray-400 hover:bg-[#1a1a1a] hover:text-white rounded-xl font-bold text-xs transition border border-transparent hover:border-[#333333]">
                <i class="fa-solid fa-database w-4"></i> File Repository
            </button>
        </nav>
    </aside>

    <!-- Main Content -->
    <main class="flex-1 overflow-y-auto p-8">

        <!-- ═══════════════════════════════════════
             UPLOAD TO STORE VIEW
        ════════════════════════════════════════ -->
        <div id="ops" class="view-pane active max-w-3xl">
            <div class="flex items-center justify-between mb-8">
                <div>
                    <h2 class="text-xl font-black text-white">Upload to Store</h2>
                    <p class="text-xs text-gray-500 mt-1">Add a new resource to the student store</p>
                </div>
                <span id="upload-status" class="hidden text-xs font-bold px-3 py-1.5 rounded-lg"></span>
            </div>

            <div class="bg-[#111111] border border-[#222222] rounded-2xl p-8 space-y-6">

                <!-- Title -->
                <div>
                    <label class="block text-xs font-bold text-gray-400 uppercase tracking-wider mb-2">Resource Title <span class="text-red-500">*</span></label>
                    <input id="res-title" type="text"
                        placeholder="e.g. Cambridge A-Level Physics P1 2023"
                        class="bg-black border border-[#333333] p-3 rounded-lg text-sm w-full focus:border-white outline-none text-white placeholder-gray-600 transition">
                </div>

                <!-- Type + Curriculum -->
                <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                    <div>
                        <label class="block text-xs font-bold text-gray-400 uppercase tracking-wider mb-2">Resource Type <span class="text-red-500">*</span></label>
                        <div class="relative">
                            <select id="res-type" class="w-full bg-black border border-[#333333] text-white text-sm p-3 rounded-lg appearance-none focus:border-white outline-none cursor-pointer transition">
                                <option value="" disabled selected>Select type...</option>
                                <option value="Textbook">📚 Textbook</option>
                                <option value="Notes">📝 Notes</option>
                                <option value="Past Papers">📄 Past Papers</option>
                                <option value="Booklets">📋 Booklets</option>
                            </select>
                            <i class="fa-solid fa-chevron-down absolute right-3 top-1/2 -translate-y-1/2 text-gray-500 text-xs pointer-events-none"></i>
                        </div>
                    </div>
                    <div>
                        <label class="block text-xs font-bold text-gray-400 uppercase tracking-wider mb-2">Curriculum <span class="text-red-500">*</span></label>
                        <div class="relative">
                            <select id="res-curriculum" class="w-full bg-black border border-[#333333] text-white text-sm p-3 rounded-lg appearance-none focus:border-white outline-none cursor-pointer transition">
                                <option value="" disabled selected>Select curriculum...</option>
                                <option value="Cambridge">🎓 Cambridge (CAIE)</option>
                                <option value="Edexcel">🏫 Edexcel (Pearson)</option>
                                <option value="IB">🌍 IB (International Baccalaureate)</option>
                                <option value="KCSE">🇰🇪 KCSE (Kenya National)</option>
                            </select>
                            <i class="fa-solid fa-chevron-down absolute right-3 top-1/2 -translate-y-1/2 text-gray-500 text-xs pointer-events-none"></i>
                        </div>
                    </div>
                </div>

                <!-- Subject + Price -->
                <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                    <div>
                        <label class="block text-xs font-bold text-gray-400 uppercase tracking-wider mb-2">Subject <span class="text-red-500">*</span></label>
                        <input id="res-subject" type="text"
                            placeholder="e.g. Mathematics, Biology..."
                            class="bg-black border border-[#333333] p-3 rounded-lg text-sm w-full focus:border-white outline-none text-white placeholder-gray-600 transition">
                    </div>
                    <div>
                        <label class="block text-xs font-bold text-gray-400 uppercase tracking-wider mb-2">Price (KES)</label>
                        <div class="relative">
                            <span class="absolute left-3 top-1/2 -translate-y-1/2 text-gray-500 text-xs font-bold">KES</span>
                            <input id="res-price" type="number" placeholder="0" min="0"
                                class="bg-black border border-[#333333] p-3 pl-10 rounded-lg text-sm w-full focus:border-white outline-none text-white placeholder-gray-600 transition">
                        </div>
                    </div>
                </div>

                <!-- Description -->
                <div>
                    <label class="block text-xs font-bold text-gray-400 uppercase tracking-wider mb-2">
                        Description <span class="text-gray-600 normal-case font-normal">(optional)</span>
                    </label>
                    <textarea id="res-desc" rows="3"
                        placeholder="Brief description of the resource..."
                        class="bg-black border border-[#333333] p-3 rounded-lg text-sm w-full focus:border-white outline-none text-white placeholder-gray-600 transition resize-none"></textarea>
                </div>

                <!-- File Drop Zone -->
                <div>
                    <label class="block text-xs font-bold text-gray-400 uppercase tracking-wider mb-2">File <span class="text-red-500">*</span></label>
                    <div id="drop-zone"
                        onclick="document.getElementById('file-input').click()"
                        class="border-2 border-dashed border-[#333333] rounded-xl p-8 text-center cursor-pointer hover:border-white transition group">
                        <input id="file-input" type="file" accept=".pdf,.doc,.docx,.ppt,.pptx,.zip" class="hidden" onchange="handleFileSelect(this)">
                        <i id="drop-icon" class="fa-solid fa-cloud-arrow-up text-2xl text-gray-600 group-hover:text-white transition mb-3 block"></i>
                        <p id="drop-label" class="text-sm text-gray-500 group-hover:text-gray-300 transition">Click to browse or drag &amp; drop</p>
                        <p class="text-xs text-gray-700 mt-1">PDF, DOC, DOCX, PPT, PPTX, ZIP</p>
                    </div>
                </div>

                <!-- Progress bar (hidden until upload starts) -->
                <div id="progress-wrap" class="hidden">
                    <div class="flex justify-between text-xs text-gray-500 mb-1">
                        <span>Uploading...</span>
                        <span id="progress-pct">0%</span>
                    </div>
                    <div class="w-full bg-[#222222] rounded-full h-1.5">
                        <div id="progress-bar" class="bg-white h-1.5 rounded-full transition-all duration-300" style="width:0%"></div>
                    </div>
                </div>

                <!-- Actions -->
                <div class="flex items-center gap-4 pt-2">
                    <button id="upload-btn" onclick="handleUpload()"
                        class="bg-white hover:bg-gray-200 text-black font-bold py-3 px-8 rounded-lg text-xs transition flex items-center gap-2 disabled:opacity-40 disabled:cursor-not-allowed">
                        <i class="fa-solid fa-upload"></i> UPLOAD TO STORE
                    </button>
                    <button onclick="resetForm()" class="text-gray-500 hover:text-white text-xs font-bold transition">
                        Clear form
                    </button>
                </div>
            </div>

            <!-- Recent Uploads Log -->
            <div class="mt-8">
                <h3 class="text-xs font-bold text-gray-400 uppercase tracking-wider mb-4">Recent Uploads</h3>
                <div id="upload-log" class="space-y-2">
                    <p id="log-empty" class="text-xs text-gray-600 italic">No uploads yet this session.</p>
                </div>
            </div>
        </div>

        <!-- ═══════════════════════════════════════
             USER MANAGEMENT VIEW
        ════════════════════════════════════════ -->
        <div id="users" class="view-pane max-w-5xl">
            <h2 class="text-xl font-black text-white">User Management</h2>
            <div class="mt-8 bg-[#111111] border border-[#222222] p-8 rounded-2xl">
                <!-- placeholder -->
            </div>
        </div>

        <!-- ═══════════════════════════════════════
             FILE REPOSITORY VIEW
        ════════════════════════════════════════ -->
        <div id="repo" class="view-pane max-w-5xl">
            <h2 class="text-xl font-black text-white">File Repository</h2>
            <div class="mt-8 bg-[#111111] border border-[#222222] p-8 rounded-2xl">
                <!-- placeholder -->
            </div>
        </div>

    </main>

    <script>
        // ── Nav ──────────────────────────────────────────────────────────────
        function showView(viewId, btn) {
            document.querySelectorAll('.view-pane').forEach(v => v.classList.remove('active'));
            document.getElementById(viewId).classList.add('active');
            document.querySelectorAll('.nav-btn').forEach(b => {
                b.classList.remove('bg-[#1a1a1a]', 'text-white', 'border-[#333333]');
                b.classList.add('text-gray-400', 'border-transparent');
            });
            btn.classList.add('bg-[#1a1a1a]', 'text-white', 'border-[#333333]');
            btn.classList.remove('text-gray-400', 'border-transparent');
        }

        // ── File select ──────────────────────────────────────────────────────
        let selectedFile = null;

        function handleFileSelect(input) {
            if (!input.files || !input.files[0]) return;
            selectedFile = input.files[0];
            const label = document.getElementById('drop-label');
            const icon  = document.getElementById('drop-icon');
            const zone  = document.getElementById('drop-zone');
            label.textContent = `✓ ${selectedFile.name}  (${(selectedFile.size / 1024).toFixed(1)} KB)`;
            label.classList.replace('text-gray-500', 'text-white');
            icon.classList.replace('text-gray-600', 'text-white');
            zone.classList.replace('border-[#333333]', 'border-white');
        }

        // Drag & drop
        const dropZone = document.getElementById('drop-zone');
        dropZone.addEventListener('dragover',  e => { e.preventDefault(); dropZone.classList.add('border-white'); });
        dropZone.addEventListener('dragleave', () => { if (!selectedFile) dropZone.classList.remove('border-white'); });
        dropZone.addEventListener('drop', e => {
            e.preventDefault();
            if (e.dataTransfer.files.length) {
                document.getElementById('file-input').files = e.dataTransfer.files;
                handleFileSelect(document.getElementById('file-input'));
            }
        });

        // ── Upload ───────────────────────────────────────────────────────────
        const typeEmoji = { 'Textbook': '📚', 'Notes': '📝', 'Past Papers': '📄', 'Booklets': '📋' };

        function setStatus(msg, isError) {
            const el = document.getElementById('upload-status');
            el.textContent = msg;
            el.className = isError
                ? 'text-xs font-bold px-3 py-1.5 rounded-lg bg-red-900/40 text-red-400 border border-red-800'
                : 'text-xs font-bold px-3 py-1.5 rounded-lg bg-green-900/40 text-green-400 border border-green-800';
            el.classList.remove('hidden');
            setTimeout(() => el.classList.add('hidden'), 5000);
        }

        function setProgress(pct) {
            document.getElementById('progress-wrap').classList.toggle('hidden', pct === null);
            if (pct !== null) {
                document.getElementById('progress-bar').style.width = pct + '%';
                document.getElementById('progress-pct').textContent  = pct + '%';
            }
        }

        async function handleUpload() {
            const title      = document.getElementById('res-title').value.trim();
            const type       = document.getElementById('res-type').value;
            const curriculum = document.getElementById('res-curriculum').value;
            const subject    = document.getElementById('res-subject').value.trim();
            const price      = document.getElementById('res-price').value || '0';

            if (!title || !type || !curriculum || !subject || !selectedFile) {
                setStatus('⚠ Please fill all required fields and select a file.', true);
                return;
            }

            // Build FormData matching your Express route:
            // title, subject, category (type), variant (curriculum), price, materialFile
            const fd = new FormData();
            fd.append('title',        title);
            fd.append('subject',      subject);
            fd.append('category',     type);
            fd.append('variant',      curriculum);
            fd.append('price',        price);
            fd.append('materialFile', selectedFile);

            // Lock UI
            const btn = document.getElementById('upload-btn');
            btn.disabled = true;
            btn.innerHTML = '<i class="fa-solid fa-spinner fa-spin"></i> Uploading...';
            setProgress(10);

            try {
                // Simulate progress ticks while waiting
                let fakePct = 10;
                const ticker = setInterval(() => {
                    fakePct = Math.min(fakePct + Math.random() * 15, 85);
                    setProgress(Math.round(fakePct));
                }, 400);

                const res = await fetch('/api/materials', {
                    method: 'POST',
                    body: fd
                    // Don't set Content-Type — browser sets it with boundary for multipart
                });

                clearInterval(ticker);
                setProgress(100);

                if (!res.ok) {
                    const err = await res.json().catch(() => ({}));
                    throw new Error(err.message || `Server error ${res.status}`);
                }

                const data = await res.json();

                // Add to session log
                const log   = document.getElementById('upload-log');
                const empty = document.getElementById('log-empty');
                if (empty) empty.remove();

                const kes   = parseInt(price) > 0 ? `KES ${parseInt(price).toLocaleString()}` : 'Free';
                const emoji = typeEmoji[type] || '📁';
                const entry = document.createElement('div');
                entry.className = 'flex items-center justify-between bg-[#111111] border border-[#222222] rounded-xl px-4 py-3';
                entry.innerHTML = `
                    <div class="flex items-center gap-3">
                        <span class="text-lg">${emoji}</span>
                        <div>
                            <p class="text-xs font-bold text-white">${title}</p>
                            <p class="text-[10px] text-gray-500">${subject} · ${curriculum} · ${type} · ID #${data.id}</p>
                        </div>
                    </div>
                    <div class="flex items-center gap-3">
                        <span class="text-xs font-bold text-gray-300">${kes}</span>
                        <span class="text-[10px] text-green-400 font-bold bg-green-900/30 border border-green-800 px-2 py-0.5 rounded-full">✓ Live</span>
                    </div>`;
                log.prepend(entry);

                setStatus('✓ Resource uploaded and live in the store.', false);
                setTimeout(() => { setProgress(null); resetForm(); }, 800);

            } catch (err) {
                setProgress(null);
                setStatus(`✗ Upload failed: ${err.message}`, true);
            } finally {
                btn.disabled = false;
                btn.innerHTML = '<i class="fa-solid fa-upload"></i> UPLOAD TO STORE';
            }
        }

        // ── Reset ────────────────────────────────────────────────────────────
        function resetForm() {
            ['res-title','res-subject','res-price','res-desc'].forEach(id => document.getElementById(id).value = '');
            document.getElementById('res-type').value       = '';
            document.getElementById('res-curriculum').value = '';
            document.getElementById('file-input').value     = '';
            selectedFile = null;

            const label = document.getElementById('drop-label');
            const icon  = document.getElementById('drop-icon');
            const zone  = document.getElementById('drop-zone');
            label.textContent = 'Click to browse or drag & drop';
            label.classList.replace('text-white', 'text-gray-500');
            icon.classList.replace('text-white', 'text-gray-600');
            zone.classList.replace('border-white', 'border-[#333333]');
            setProgress(null);
        }
    </script>
</body>
</html>
