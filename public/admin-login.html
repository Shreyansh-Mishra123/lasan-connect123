<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Staff Terminal Access | Lasan Portal</title>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="icon" type="image/png" href="1776759415-161570595069e73277f252e!favicon-512.png">
    
    <style>
        body { font-family: 'Segoe UI', sans-serif; background-color: #000; color: #fff; margin: 0; padding: 0; display: flex; justify-content: center; align-items: center; min-height: 100vh; }
        
        .login-container { 
            position: relative; 
            width: 100%; 
            max-width: 400px; 
            padding: 2.5rem; 
            background: #111; 
            border: 1px solid #222; 
            border-radius: 10px; 
        }

        .back-home { 
            position: absolute; 
            top: 15px; 
            left: 15px; 
            color: #555; 
            text-decoration: none; 
            font-size: 0.7rem; 
            text-transform: uppercase;
            transition: 0.3s; 
        }
        .back-home:hover { color: #fff; }

        .icon-box { width: 50px; height: 50px; background: #fff; color: #000; border-radius: 50%; display: flex; justify-content: center; align-items: center; margin: 0 auto 1.5rem; font-size: 1.2rem; }
        .header { text-align: center; margin-bottom: 2rem; }
        .header h1 { font-size: 1.5rem; margin-bottom: 0.5rem; }
        .header p { color: #666; font-size: 0.9rem; }
        .form-group { margin-bottom: 1.5rem; }
        label { display: block; margin-bottom: 0.5rem; font-size: 0.8rem; color: #aaa; text-transform: uppercase; letter-spacing: 0.05em; }
        input { width: 100%; padding: 12px; border-radius: 5px; border: 1px solid #333; background: #000; color: #fff; box-sizing: border-box; }
        input:focus { outline: 1px solid #fff; }
        
        .btn { width: 100%; padding: 12px; border-radius: 5px; border: none; font-weight: bold; cursor: pointer; margin-top: 1rem; transition: 0.3s; }
        .btn-primary { background: #fff; color: #000; }
        .btn-primary:hover { background: #ccc; }
        
        .error { background: #200; border: 1px solid #400; color: #f88; padding: 10px; border-radius: 5px; margin-bottom: 1rem; font-size: 0.8rem; display: none; }
        .footer-link { text-align: center; margin-top: 1.5rem; font-size: 0.8rem; color: #666; }
        .footer-link a { color: #fff; text-decoration: underline; }
    </style>
</head>
<body>

    <div class="login-container">
        <a href="index.html" class="back-home"><i class="fa-solid fa-arrow-left"></i> Home</a>

        <div class="icon-box">
            <i class="fa-solid fa-shield-halved"></i>
        </div>

        <div class="header">
            <h1>Administrative Console</h1>
            <p>Enter system level clearance coordinates to manage syllabus structures.</p>
        </div>

        <div id="errorAlert" class="error">
            <i class="fa-solid fa-circle-exclamation"></i>
            <span id="errorMessage">Clearance parameter handshake signature invalid.</span>
        </div>

        <form id="adminLoginForm">
            <div class="form-group">
                <label for="adminUsername">System Admin Identity</label>
                <input type="text" id="adminUsername" required placeholder="admin_root">
            </div>
            
            <div class="form-group">
                <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 0.5rem;">
                    <label for="adminPassword" style="margin-bottom: 0;">System Private Key Pass</label>
                    <a href="admin-forgot.html" style="font-size: 0.7rem; color: #666; text-decoration: underline;">Forgot security path?</a>
                </div>
                <input type="password" id="adminPassword" required placeholder="••••••••">
            </div>
            
            <button type="submit" id="submitBtn" class="btn btn-primary">Unlock Telemetry Controls</button>
        </form>

        <div class="footer-link">
            Looking for past paper store frames? <a href="student-login.html">Return to Student Base</a>
        </div>
    </div>

    <script>
    // Check if already logged in
    if (localStorage.getItem('lasan_token') && localStorage.getItem('lasan_role') === 'admin') {
        window.location.href = 'admin-dashboard.html';
    }

    document.getElementById('adminLoginForm').addEventListener('submit', async (e) => {
        e.preventDefault();
        
        const username = document.getElementById('adminUsername').value;
        const password = document.getElementById('adminPassword').value;
        const errorAlert = document.getElementById('errorAlert');
        const errorMessage = document.getElementById('errorMessage');
        const submitBtn = document.getElementById('submitBtn');

        // Reset UI State
        errorAlert.style.display = 'none';
        submitBtn.disabled = true;
        submitBtn.innerText = 'Running Security Checks...';

        try {
            const response = await fetch('http://localhost:5000/api/auth/admin-login', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ username, password })
            });

            const data = await response.json();

            if (response.ok) {
                localStorage.setItem('lasan_token', data.token);
                localStorage.setItem('lasan_user', data.username);
                localStorage.setItem('lasan_role', data.role);
                
                window.location.href = 'admin-dashboard.html';
            } else {
                throw new Error(data.message || "Invalid clearance credentials.");
            }
        } catch (err) {
            errorMessage.innerText = err.message;
            errorAlert.style.display = 'block';
            submitBtn.disabled = false;
            submitBtn.innerText = 'Unlock Telemetry Controls';
        }
    });
</script>
</body>
</html>
