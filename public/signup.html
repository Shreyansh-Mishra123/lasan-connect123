<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Create Account | Lasan Portal</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="icon" type="image/png" href="1776759415-161570595069e73277f252e!favicon-512.png">
    <style>
        body { 
            font-family: 'Segoe UI', sans-serif; 
            background-color: #000; 
            color: #fff; 
            margin: 0; 
            padding: 0; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            min-height: 100vh; 
        }
        .login-container { 
            width: 100%; 
            max-width: 400px; 
            padding: 2.5rem; 
            background: #111; 
            border: 1px solid #222; 
            border-radius: 10px; 
            text-align: center; 
            box-sizing: border-box;
        }
        .icon-box { 
            width: 50px; 
            height: 50px; 
            background: #fff; 
            color: #000; 
            border-radius: 50%; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            margin: 0 auto 1.5rem; 
            font-size: 1.2rem; 
        }
        .header { margin-bottom: 2rem; }
        .header h1 { font-size: 1.5rem; margin-bottom: 0.5rem; }
        .header p { color: #666; font-size: 0.9rem; }
        
        .btn-google { 
            width: 100%; 
            padding: 14px; 
            border-radius: 5px; 
            border: none; 
            font-weight: bold; 
            cursor: pointer; 
            transition: 0.3s; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            background: #fff; 
            color: #000; 
            font-size: 0.9rem;
        }
        .btn-google:hover { background: #ccc; }
        
        .footer-link { margin-top: 1.5rem; font-size: 0.8rem; color: #666; }
        .footer-link a { color: #fff; text-decoration: underline; }
    </style>
</head>
<body>

    <div class="login-container">
        <div class="icon-box"><i class="fa-solid fa-user-plus"></i></div>
        <div class="header">
            <h1>Create Student Account</h1>
            <p>Join the Lasan Portal using your Google account.</p>
        </div>

        <button onclick="handleGoogleSignup()" class="btn-google">
            <i class="fa-brands fa-google" style="margin-right: 8px;"></i> Sign up with Google
        </button>

        <div class="footer-link">
            Already have an account? <a href="student-login.html">Login here</a>
        </div>
    </div>

    <script>
        function handleGoogleSignup() {
            // This will redirect to the Google Auth route
            window.location.href = 'https://lasan-connect123.onrender.com/api/auth/google';
        }
    </script>
</body>
</html>
