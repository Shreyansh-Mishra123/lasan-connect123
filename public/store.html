<!DOCTYPE html>
<html lang="en" class="h-full bg-[#000]">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Syllabus Directory | Lasan Portal</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Segoe+UI&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="icon" type="image/png" href="1776759415-161570595069e73277f252e!favicon-512.png">
    <style>
        body { font-family: 'Segoe UI', sans-serif; }
        .smooth-transition { transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1); }
        .custom-scrollbar::-webkit-scrollbar { width: 4px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: #000; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #333; }
    </style>
</head>
<body class="h-full text-slate-200 antialiased selection:bg-white/20">

    <header class="h-16 border-b border-[#222] bg-[#000] sticky top-0 z-40 w-full">
        <div class="h-full max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 flex items-center justify-between">
            <div class="flex items-center gap-3">
                <div class="h-8 w-8 bg-white rounded-full flex items-center justify-center">
                    <i class="fa-solid fa-shield-halved text-black text-sm"></i>
                </div>
                <span class="text-lg font-bold tracking-tight text-white">LasanPortal</span>
            </div>
            <div class="flex items-center gap-4">
                <span id="userName" class="text-xs font-semibold text-slate-400"></span>
                <button onclick="showStore()" class="text-slate-400 hover:text-white text-xs font-semibold transition-colors">Store</button>
                <button onclick="showLibrary()" class="text-slate-400 hover:text-white text-xs font-semibold transition-colors">My Library</button>
                <button id="cartBtn" class="relative text-slate-400 hover:text-white p-2 transition-colors cursor-pointer">
                    <i class="fa-solid fa-basket-shopping text-lg"></i>
                    <span id="cartCount" class="absolute -top-0.5 -right-0.5 h-4 min-w-4 px-1 rounded-full bg-white text-[10px] font-bold text-black flex items-center justify-center">0</span>
                </button>
                <button onclick="logoutPortalSession()" class="px-3 py-1.5 bg-[#111] hover:bg-[#222] text-slate-400 hover:text-white font-semibold text-xs rounded border border-[#333] smooth-transition cursor-pointer">
                    Sign Out
                </button>
            </div>
        </div>
    </header>

    <main class="max-w-7xl w-full mx-auto p-4 sm:p-6 lg:p-8 space-y-8">
        <div id="storeView">
            <h1 class="text-xl font-bold text-white tracking-tight">Past Paper Resource Vault</h1>
            <div id="storeGrid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-5 mt-6">
                <p class="text-[#666] text-sm">Accessing vault records...</p>
            </div>
        </div>

        <div id="libraryView" class="hidden">
            <h1 class="text-xl font-bold text-white tracking-tight">My Library</h1>
            <div id="libraryGrid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-5 mt-6">
                <p class="text-[#666] text-sm">Loading your acquired assets...</p>
            </div>
        </div>
    </main>

    <div id="checkoutPanel" class="fixed inset-0 z-50 overflow-hidden hidden">
        <div class="absolute inset-0 bg-black/80 backdrop-blur-sm"></div>
        <div class="absolute inset-y-0 right-0 w-full max-w-md bg-[#111] border-l border-[#222] flex flex-col">
            <div class="p-6 border-b border-[#222] flex items-center justify-between">
                <h2 class="text-sm font-bold text-white uppercase tracking-wider">Checkout</h2>
                <button id="closeCheckoutBtn" class="text-white hover:text-slate-400"><i class="fa-solid fa-xmark"></i></button>
            </div>
            <div id="cartItemsContainer" class="flex-1 overflow-y-auto p-6 custom-scrollbar space-y-3"></div>
            <div class="p-6 border-t border-[#222] space-y-4">
                <div class="flex justify-between items-center text-sm font-bold text-white">
                    <span>Total</span>
                    <span id="totalDisplay">KES 0</span>
                </div>
                <button id="payBtn" onclick="initiateMpesaPayment()" class="w-full py-3 bg-white text-black font-bold text-sm rounded hover:bg-[#ccc]">Unlock Resource</button>
            </div>
        </div>
    </div>

    <script>
        // 1. Session Auth Integration
        const originalFetch = window.fetch;
        window.fetch = function(resource, config = {}) {
            config.credentials = 'include'; // Ensures browser sends Google Auth Cookies
            config.headers = config.headers || {};
            if (config.method && config.method !== 'GET') config.headers['Content-Type'] = 'application/json';
            return originalFetch(resource, config);
        }; 

        // 2. Validate Session
        async function verifySession() {
            try {
                const response = await fetch('/api/check-session');
                if (response.status !== 200) window.location.href = 'index.html';
                else document.getElementById('userName').innerText = 'Student';
            } catch (err) { window.location.href = 'index.html'; }
        }
        verifySession();

        // 3. Navigation
        function showLibrary() {
            document.getElementById('storeView').classList.add('hidden');
            document.getElementById('libraryView').classList.remove('hidden');
            fetchLibrary();
        }
        function showStore() {
            document.getElementById('libraryView').classList.add('hidden');
            document.getElementById('storeView').classList.remove('hidden');
        }

        // 4. Data Fetching
        async function fetchLibrary() {
            const grid = document.getElementById('libraryGrid');
            try {
                const res = await fetch('http://localhost:5000/api/user-library');
                const files = await res.json();
                grid.innerHTML = files.length ? '' : '<p class="text-[#666] text-sm">No materials in library yet.</p>';
                files.forEach(f => {
                    grid.innerHTML += `<div class="bg-[#111] border border-[#222] rounded-md p-5">
                        <h2 class="text-base font-semibold text-white">${f.name}</h2>
                        <button onclick="downloadAsPdf('http://localhost:5000${f.fileUrl}', '${f.name}')" class="mt-4 text-xs text-blue-400 hover:text-blue-300">Download File</button>
                    </div>`;
                });
            } catch (err) { grid.innerHTML = '<p class="text-red-500 text-sm">Library unavailable.</p>'; }
        }

        async function fetchStoreMaterials() {
            const storeGrid = document.getElementById('storeGrid');
            try {
                const response = await fetch('http://localhost:5000/api/materials');
                const materials = await response.json();
                storeGrid.innerHTML = '';
                materials.forEach(item => {
                    const card = document.createElement('div');
                    card.className = "bg-[#111] border border-[#222] rounded-md p-5 flex flex-col justify-between";
                    card.innerHTML = `<div>
                        <span class="text-[10px] font-mono text-[#aaa] border border-[#333] px-2 py-1 rounded">${item.category}</span>
                        <h2 class="text-base font-semibold text-white mt-3">${item.name}</h2></div>
                        <div class="mt-6 pt-4 border-t border-[#222] flex items-center justify-between">
                            <span class="text-xs font-bold text-white">KES 0</span>
                            <button onclick="addToCart('${item.id}', '${item.name}', 0, '${item.fileUrl}')" class="px-3 py-1.5 bg-white text-black font-bold text-xs rounded hover:bg-[#ccc]">Unlock</button>
                        </div>`;
                    storeGrid.appendChild(card);
                });
            } catch (err) { storeGrid.innerHTML = '<p class="text-red-500 text-sm">Vault connection failed.</p>'; }
        }

        async function initiateMpesaPayment() {
            if (cart.length === 0) return;
            for (const item of cart) {
                await fetch('http://localhost:5000/api/record-purchase', {
                    method: 'POST',
                    body: JSON.stringify({ materialId: item.id })
                });
                await downloadAsPdf('http://localhost:5000' + item.fileUrl, item.title);
            }
            cart = []; renderCart(); document.getElementById('checkoutPanel').classList.add('hidden');
        }

        // 5. Helpers
        let cart = [];
        function addToCart(id, title, price, fileUrl) {
            if (!cart.find(item => item.id === id)) {
                cart.push({ id, title, price, fileUrl });
                renderCart();
            }
            document.getElementById('checkoutPanel').classList.remove('hidden');
        }
        function renderCart() {
            document.getElementById('cartCount').innerText = cart.length;
            const container = document.getElementById('cartItemsContainer');
            container.innerHTML = '';
            cart.forEach(item => {
                const div = document.createElement('div');
                div.className = "flex justify-between items-center bg-black p-4 border border-[#222] rounded";
                div.innerHTML = `<div><p class="text-sm font-bold text-white">${item.title}</p></div>
                                 <button onclick="cart = cart.filter(i=>i.id!=='${item.id}');renderCart();" class="text-red-500 text-xs">Remove</button>`;
                container.appendChild(div);
            });
        }
        async function downloadAsPdf(url, fileName) {
            if (!fileName.toLowerCase().endsWith('.pdf')) fileName += '.pdf';
            const res = await fetch(url);
            const blob = await res.blob();
            const link = document.createElement('a');
            link.href = URL.createObjectURL(blob);
            link.download = fileName;
            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);
        }
        document.getElementById('cartBtn').addEventListener('click', () => document.getElementById('checkoutPanel').classList.remove('hidden'));
        document.getElementById('closeCheckoutBtn').addEventListener('click', () => document.getElementById('checkoutPanel').classList.add('hidden'));
        function logoutPortalSession() { window.location.href = '/api/logout'; }
        document.addEventListener('DOMContentLoaded', fetchStoreMaterials);
    </script>
</body>
</html>
