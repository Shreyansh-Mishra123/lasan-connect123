<!DOCTYPE html>
<html lang="en" class="h-full">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Resource Vault | Lasan Portal</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="icon" type="image/png" href="1776759415-161570595069e73277f252e!favicon-512.png">
    <style>
        :root {
            --bg:       #000;
            --surface:  #0e0e0e;
            --surface2: #161616;
            --border:   #242424;
            --border2:  #2e2e2e;
            --text:     #e8e8e8;
            --muted:    #666;
            --muted2:   #444;
        }
        * { box-sizing: border-box; }
        body {
            font-family: 'DM Sans', sans-serif;
            background: var(--bg);
            color: var(--text);
            margin: 0;
        }
        /* Scrollbar */
        ::-webkit-scrollbar { width: 3px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #2a2a2a; border-radius: 99px; }

        /* Card hover lift */
        .resource-card {
            transition: transform 0.2s ease, border-color 0.2s ease, box-shadow 0.2s ease;
        }
        .resource-card:hover {
            transform: translateY(-2px);
            border-color: #383838 !important;
            box-shadow: 0 8px 32px rgba(0,0,0,0.6);
        }

        /* Fade-in animation */
        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(12px); }
            to   { opacity: 1; transform: translateY(0); }
        }
        .fade-up {
            animation: fadeUp 0.35s ease forwards;
            opacity: 0;
        }

        /* Checkout slide-in */
        @keyframes slideIn {
            from { transform: translateX(100%); }
            to   { transform: translateX(0); }
        }
        .slide-in { animation: slideIn 0.28s cubic-bezier(0.16,1,0.3,1) forwards; }

        /* Pill badge */
        .pill {
            font-family: 'DM Mono', monospace;
            font-size: 10px;
            letter-spacing: 0.04em;
            padding: 3px 8px;
            border-radius: 99px;
            border: 1px solid var(--border2);
            color: #888;
            white-space: nowrap;
        }
        .pill.cambridge { border-color: #2a3a2a; color: #6a9a6a; background: #0d1a0d; }
        .pill.edexcel   { border-color: #2a2a3a; color: #6a6aaa; background: #0d0d1a; }
        .pill.ib        { border-color: #3a2a2a; color: #aa6a6a; background: #1a0d0d; }
        .pill.kcse      { border-color: #3a300a; color: #aaaa6a; background: #1a180d; }

        /* Filter chip */
        .chip {
            cursor: pointer;
            padding: 6px 14px;
            border-radius: 99px;
            border: 1px solid var(--border);
            color: var(--muted);
            font-size: 12px;
            font-weight: 500;
            transition: all 0.15s ease;
            background: transparent;
        }
        .chip:hover  { border-color: var(--border2); color: var(--text); }
        .chip.active { border-color: #fff; color: #fff; background: #1a1a1a; }

        /* Search input */
        .search-input {
            background: var(--surface);
            border: 1px solid var(--border);
            color: var(--text);
            font-family: 'DM Sans', sans-serif;
            font-size: 13px;
            padding: 8px 14px 8px 36px;
            border-radius: 99px;
            outline: none;
            transition: border-color 0.15s;
            width: 220px;
        }
        .search-input:focus { border-color: #444; }
        .search-input::placeholder { color: var(--muted2); }

        /* Unlock btn */
        .unlock-btn {
            background: #fff;
            color: #000;
            font-weight: 700;
            font-size: 11px;
            letter-spacing: 0.04em;
            padding: 7px 16px;
            border-radius: 6px;
            border: none;
            cursor: pointer;
            transition: background 0.15s, transform 0.1s;
        }
        .unlock-btn:hover  { background: #ddd; }
        .unlock-btn:active { transform: scale(0.97); }

        /* Nav active */
        .nav-link.active { color: #fff !important; }
        .nav-link.active::after {
            content: '';
            display: block;
            height: 2px;
            background: #fff;
            border-radius: 2px;
            margin-top: 2px;
        }

        /* Checkout overlay */
        #checkoutOverlay { backdrop-filter: blur(4px); }
    </style>
</head>
<body>

<!-- ── Header ──────────────────────────────────────────────────────────────── -->
<header style="background:rgba(0,0,0,0.85); backdrop-filter:blur(12px); border-bottom:1px solid var(--border);"
        class="h-14 sticky top-0 z-40 w-full">
    <div class="h-full max-w-6xl mx-auto px-5 flex items-center justify-between">

        <!-- Logo -->
        <div class="flex items-center">
            <span style="font-weight:900; font-size:17px; letter-spacing:0.08em; color:#fff; font-family:'DM Sans',sans-serif;">LASAN</span><span style="font-weight:900; font-size:17px; letter-spacing:0.08em; color:#666; font-family:'DM Sans',sans-serif;">PORTAL</span>
        </div>

        <!-- Nav -->
        <nav class="flex items-center gap-6">
            <button onclick="showStore()" id="nav-store"
                class="nav-link active text-sm font-medium text-white transition-colors" style="background:none;border:none;cursor:pointer;padding:0;">
                Store
            </button>
            <button onclick="showLibrary()" id="nav-library"
                class="nav-link text-sm font-medium transition-colors" style="color:var(--muted);background:none;border:none;cursor:pointer;padding:0;">
                My Library
            </button>
        </nav>

        <!-- Right actions -->
        <div class="flex items-center gap-3">
            <span id="userName" style="font-size:12px; color:var(--muted); font-weight:500;"></span>
            <button id="cartBtn" class="relative p-2 transition-colors" style="color:var(--muted); background:none; border:none; cursor:pointer;">
                <i class="fa-solid fa-bag-shopping" style="font-size:16px;"></i>
                <span id="cartCount"
                    class="absolute -top-0.5 -right-0.5 h-4 min-w-4 px-1 rounded-full bg-white text-black flex items-center justify-center"
                    style="font-size:9px; font-weight:800;">0</span>
            </button>
            <button onclick="logoutPortalSession()"
                style="padding:6px 14px; background:var(--surface); border:1px solid var(--border); color:var(--muted); font-size:12px; font-weight:600; border-radius:6px; cursor:pointer; transition:all 0.15s;"
                onmouseover="this.style.color='#fff'; this.style.borderColor='var(--border2)'"
                onmouseout="this.style.color='var(--muted)'; this.style.borderColor='var(--border)'">
                Sign Out
            </button>
        </div>
    </div>
</header>

<!-- ── Main ────────────────────────────────────────────────────────────────── -->
<main class="max-w-6xl mx-auto px-5 py-8">

    <!-- ══ STORE VIEW ══ -->
    <div id="storeView">

        <!-- Page title row -->
        <div class="flex flex-col sm:flex-row sm:items-end justify-between gap-4 mb-8">
            <div>
                <p style="font-family:'DM Mono',monospace; font-size:10px; color:var(--muted); letter-spacing:0.1em; text-transform:uppercase; margin-bottom:6px;">Resource Vault</p>
                <h1 style="font-size:22px; font-weight:700; color:#fff; letter-spacing:-0.02em; margin:0;">Past Papers &amp; Study Materials</h1>
            </div>
            <!-- Search -->
            <div class="relative shrink-0">
                <i class="fa-solid fa-magnifying-glass absolute left-3 top-1/2 -translate-y-1/2" style="color:var(--muted2); font-size:11px;"></i>
                <input id="filter-search" oninput="applyFilters()" type="text"
                    placeholder="Search title or subject..."
                    class="search-input">
            </div>
        </div>

        <!-- Filter chips -->
        <div class="flex flex-wrap gap-2 mb-6" id="filterRow">
            <!-- Curriculum filters -->
            <button class="chip active" data-group="curr" data-val="" onclick="setFilter('curr','',this)">All</button>
            <button class="chip" data-group="curr" data-val="Cambridge" onclick="setFilter('curr','Cambridge',this)">Cambridge</button>
            <button class="chip" data-group="curr" data-val="Edexcel"   onclick="setFilter('curr','Edexcel',this)">Edexcel</button>
            <button class="chip" data-group="curr" data-val="IB"        onclick="setFilter('curr','IB',this)">IB</button>
            <button class="chip" data-group="curr" data-val="KCSE"      onclick="setFilter('curr','KCSE',this)">KCSE</button>

            <div style="width:1px; background:var(--border); margin:0 4px;"></div>

            <!-- Type filters -->
            <button class="chip active" data-group="type" data-val="" onclick="setFilter('type','',this)">All Types</button>
            <button class="chip" data-group="type" data-val="Textbook"    onclick="setFilter('type','Textbook',this)">📚 Textbooks</button>
            <button class="chip" data-group="type" data-val="Notes"       onclick="setFilter('type','Notes',this)">📝 Notes</button>
            <button class="chip" data-group="type" data-val="Past Papers" onclick="setFilter('type','Past Papers',this)">📄 Past Papers</button>
            <button class="chip" data-group="type" data-val="Booklets"    onclick="setFilter('type','Booklets',this)">📋 Booklets</button>

            <span id="result-count" class="ml-auto self-center" style="font-size:11px; color:var(--muted); font-family:'DM Mono',monospace;"></span>
        </div>

        <!-- Grid -->
        <div id="storeGrid" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-4">
            <!-- skeleton placeholders -->
            <div class="resource-card rounded-xl p-5 h-40 animate-pulse" style="background:var(--surface); border:1px solid var(--border);"></div>
            <div class="resource-card rounded-xl p-5 h-40 animate-pulse" style="background:var(--surface); border:1px solid var(--border);"></div>
            <div class="resource-card rounded-xl p-5 h-40 animate-pulse" style="background:var(--surface); border:1px solid var(--border);"></div>
        </div>
    </div>

    <!-- ══ LIBRARY VIEW ══ -->
    <div id="libraryView" class="hidden">
        <div class="mb-8">
            <p style="font-family:'DM Mono',monospace; font-size:10px; color:var(--muted); letter-spacing:0.1em; text-transform:uppercase; margin-bottom:6px;">Your Collection</p>
            <h1 style="font-size:22px; font-weight:700; color:#fff; letter-spacing:-0.02em; margin:0;">My Library</h1>
        </div>
        <div id="libraryGrid" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-4">
            <p style="color:var(--muted); font-size:13px;">Loading your collection...</p>
        </div>
    </div>
</main>

<!-- ── Checkout Panel ──────────────────────────────────────────────────────── -->
<div id="checkoutPanel" class="fixed inset-0 z-50 hidden">
    <div id="checkoutOverlay" class="absolute inset-0" style="background:rgba(0,0,0,0.75);" onclick="closeCheckout()"></div>
    <div class="slide-in absolute inset-y-0 right-0 w-full max-w-sm flex flex-col"
         style="background:var(--surface); border-left:1px solid var(--border);">

        <!-- Header -->
        <div class="p-5 flex items-center justify-between" style="border-bottom:1px solid var(--border);">
            <div>
                <h2 style="font-size:14px; font-weight:700; color:#fff; letter-spacing:0.05em; text-transform:uppercase;">Cart</h2>
                <p id="cartSubtitle" style="font-size:11px; color:var(--muted); margin-top:2px;">0 items</p>
            </div>
            <button onclick="closeCheckout()" style="background:var(--surface2); border:1px solid var(--border); color:var(--muted); width:30px; height:30px; border-radius:6px; cursor:pointer; font-size:13px;">
                <i class="fa-solid fa-xmark"></i>
            </button>
        </div>

        <!-- Items -->
        <div id="cartItemsContainer" class="flex-1 overflow-y-auto p-5 space-y-3"></div>

        <!-- Footer -->
        <div class="p-5" style="border-top:1px solid var(--border);">
            <div class="flex justify-between items-center mb-4">
                <span style="font-size:12px; color:var(--muted); font-weight:600; text-transform:uppercase; letter-spacing:0.05em;">Total</span>
                <span id="totalDisplay" style="font-size:18px; font-weight:700; color:#fff;">KES 0</span>
            </div>
            <button id="payBtn" onclick="initiateMpesaPayment()"
                style="width:100%; padding:13px; background:#fff; color:#000; font-weight:700; font-size:13px; border-radius:8px; border:none; cursor:pointer; transition:background 0.15s; letter-spacing:0.02em;"
                onmouseover="this.style.background='#ddd'" onmouseout="this.style.background='#fff'">
                Unlock Resources
            </button>
        </div>
    </div>
</div>

<script>
    // ── Fetch wrapper ─────────────────────────────────────────────────────────
    const _fetch = window.fetch;
    window.fetch = (resource, cfg = {}) => {
        cfg.credentials = 'include';
        cfg.headers = cfg.headers || {};
        if (cfg.method && cfg.method !== 'GET' && !(cfg.body instanceof FormData))
            cfg.headers['Content-Type'] = 'application/json';
        return _fetch(resource, cfg);
    };

    // ── Session ───────────────────────────────────────────────────────────────
    (async () => {
        try {
            const r = await fetch('/api/check-session');
            if (r.status !== 200) location.href = 'student-login.html';
            else document.getElementById('userName').textContent = 'Student';
        } catch { location.href = 'student-login.html'; }
    })();

    // ── Navigation ────────────────────────────────────────────────────────────
    function showStore() {
        document.getElementById('libraryView').classList.add('hidden');
        document.getElementById('storeView').classList.remove('hidden');
        document.getElementById('filterRow').classList.remove('hidden');
        document.getElementById('nav-store').classList.add('active');
        document.getElementById('nav-library').classList.remove('active');
        document.getElementById('nav-library').style.color = 'var(--muted)';
    }
    function showLibrary() {
        document.getElementById('storeView').classList.add('hidden');
        document.getElementById('filterRow').classList.add('hidden');
        document.getElementById('libraryView').classList.remove('hidden');
        document.getElementById('nav-library').classList.add('active');
        document.getElementById('nav-store').classList.remove('active');
        document.getElementById('nav-store').style.color = 'var(--muted)';
        fetchLibrary();
    }

    // ── Store Data ────────────────────────────────────────────────────────────
    let allMaterials = [];
    let activeFilters = { curr: '', type: '' };

    const currClass = { Cambridge:'cambridge', Edexcel:'edexcel', IB:'ib', KCSE:'kcse' };
    const typeEmoji = { Textbook:'📚', Notes:'📝', 'Past Papers':'📄', Booklets:'📋' };

    async function fetchStoreMaterials() {
        try {
            const res = await fetch('/api/materials');
            allMaterials = await res.json();
            renderGrid(allMaterials);
        } catch {
            document.getElementById('storeGrid').innerHTML =
                `<p style="color:#e55; font-size:13px; grid-column:1/-1;">Vault connection failed. Please refresh.</p>`;
        }
    }

    function renderGrid(materials) {
        const grid = document.getElementById('storeGrid');
        document.getElementById('result-count').textContent =
            materials.length ? `${materials.length} result${materials.length !== 1 ? 's' : ''}` : '';

        if (!materials.length) {
            grid.innerHTML = `<p style="color:var(--muted); font-size:13px; grid-column:1/-1;">No resources match your filters.</p>`;
            return;
        }

        grid.innerHTML = '';
        materials.forEach((item, i) => {
            const title    = item.title    || 'Untitled';
            const subject  = item.subject  || '';
            const category = item.category || 'Resource';
            const variant  = item.variant  || '';
            const price    = parseInt(item.price) || 0;
            const priceLabel = price > 0 ? `KES ${price.toLocaleString()}` : 'Free';
            const emoji    = typeEmoji[category] || '📁';
            const cc       = currClass[variant] || '';

            // Escape for inline onclick
            const safeTitle = title.replace(/'/g, "\\'").replace(/"/g, '&quot;');

            const card = document.createElement('div');
            card.className = 'resource-card fade-up rounded-xl p-5 flex flex-col justify-between';
            card.style.cssText = `background:var(--surface); border:1px solid var(--border); animation-delay:${i * 40}ms;`;
            card.innerHTML = `
                <div>
                    <div style="display:flex; gap:6px; flex-wrap:wrap; margin-bottom:12px;">
                        <span class="pill">${emoji} ${category}</span>
                        ${variant ? `<span class="pill ${cc}">${variant}</span>` : ''}
                    </div>
                    <h2 style="font-size:14px; font-weight:600; color:#fff; line-height:1.4; margin:0 0 4px;">${title}</h2>
                    ${subject ? `<p style="font-size:12px; color:var(--muted); margin:0;">${subject}</p>` : ''}
                </div>
                <div style="margin-top:16px; padding-top:14px; border-top:1px solid var(--border); display:flex; align-items:center; justify-content:space-between;">
                    <span style="font-size:13px; font-weight:700; color:#fff;">${priceLabel}</span>
                    <button class="unlock-btn" onclick="addToCart('${item.id}', '${safeTitle}', ${price}, '${item.fileUrl || ''}')">
                        Unlock
                    </button>
                </div>`;
            grid.appendChild(card);
        });
    }

    // ── Filters ───────────────────────────────────────────────────────────────
    function setFilter(group, val, btn) {
        activeFilters[group] = val;
        document.querySelectorAll(`.chip[data-group="${group}"]`).forEach(c => c.classList.remove('active'));
        btn.classList.add('active');
        applyFilters();
    }

    function applyFilters() {
        const search = (document.getElementById('filter-search').value || '').toLowerCase();
        const filtered = allMaterials.filter(item => {
            const matchCurr = !activeFilters.curr || item.variant   === activeFilters.curr;
            const matchType = !activeFilters.type || item.category  === activeFilters.type;
            const matchSrch = !search ||
                (item.title   || '').toLowerCase().includes(search) ||
                (item.subject || '').toLowerCase().includes(search);
            return matchCurr && matchType && matchSrch;
        });
        renderGrid(filtered);
    }

    // ── Library ───────────────────────────────────────────────────────────────
    async function fetchLibrary() {
        const grid = document.getElementById('libraryGrid');
        grid.innerHTML = `<p style="color:var(--muted); font-size:13px;">Loading...</p>`;
        try {
            const res   = await fetch('/api/user-library');
            const files = await res.json();
            if (!files.length) {
                grid.innerHTML = `
                    <div style="grid-column:1/-1; text-align:center; padding:60px 0;">
                        <i class="fa-solid fa-book-open" style="font-size:28px; color:var(--muted2); display:block; margin-bottom:12px;"></i>
                        <p style="color:var(--muted); font-size:13px;">Your library is empty. Unlock resources from the store.</p>
                    </div>`;
                return;
            }
            grid.innerHTML = '';
            files.forEach((f, i) => {
                const title = f.title || f.name || 'Untitled';
                const card = document.createElement('div');
                card.className = 'resource-card fade-up rounded-xl p-5 flex flex-col justify-between';
                card.style.cssText = `background:var(--surface); border:1px solid var(--border); animation-delay:${i*40}ms;`;
                card.innerHTML = `
                    <div>
                        <div style="display:flex; gap:6px; margin-bottom:12px;">
                            <span class="pill">${typeEmoji[f.category] || '📁'} ${f.category || 'Resource'}</span>
                            ${f.variant ? `<span class="pill ${currClass[f.variant]||''}">${f.variant}</span>` : ''}
                        </div>
                        <h2 style="font-size:14px; font-weight:600; color:#fff; line-height:1.4; margin:0 0 4px;">${title}</h2>
                        ${f.subject ? `<p style="font-size:12px; color:var(--muted); margin:0;">${f.subject}</p>` : ''}
                    </div>
                    <button onclick="downloadAsPdf('/uploads/${(f.fileUrl||'').split('/').pop()}','${title.replace(/'/g,"\\'")}')"
                        style="margin-top:16px; padding-top:14px; border-top:1px solid var(--border); display:flex; align-items:center; gap:6px; background:none; border-left:none; border-right:none; border-bottom:none; color:var(--muted); font-size:12px; font-weight:600; cursor:pointer; transition:color 0.15s; width:100%;"
                        onmouseover="this.style.color='#fff'" onmouseout="this.style.color='var(--muted)'">
                        <i class="fa-solid fa-download" style="font-size:11px;"></i> Download
                    </button>`;
                grid.appendChild(card);
            });
        } catch {
            grid.innerHTML = `<p style="color:#e55; font-size:13px;">Library unavailable.</p>`;
        }
    }

    // ── Cart ──────────────────────────────────────────────────────────────────
    let cart = [];

    function addToCart(id, title, price, fileUrl) {
        if (!cart.find(i => i.id === id)) {
            cart.push({ id, title, price, fileUrl });
            renderCart();
        }
        openCheckout();
    }

    function removeFromCart(id) {
        cart = cart.filter(i => i.id !== id);
        renderCart();
    }

    function renderCart() {
        document.getElementById('cartCount').textContent = cart.length;
        document.getElementById('cartSubtitle').textContent = `${cart.length} item${cart.length !== 1 ? 's' : ''}`;

        const container = document.getElementById('cartItemsContainer');
        let total = 0;

        if (!cart.length) {
            container.innerHTML = `
                <div style="text-align:center; padding:40px 0; color:var(--muted);">
                    <i class="fa-solid fa-bag-shopping" style="font-size:24px; display:block; margin-bottom:10px; opacity:0.4;"></i>
                    <p style="font-size:13px;">Your cart is empty</p>
                </div>`;
        } else {
            container.innerHTML = '';
            cart.forEach(item => {
                total += item.price;
                const div = document.createElement('div');
                div.style.cssText = `display:flex; justify-content:space-between; align-items:center; background:var(--surface2); padding:12px 14px; border:1px solid var(--border); border-radius:8px;`;
                div.innerHTML = `
                    <div style="flex:1; min-width:0;">
                        <p style="font-size:13px; font-weight:600; color:#fff; margin:0; white-space:nowrap; overflow:hidden; text-overflow:ellipsis;">${item.title}</p>
                        <p style="font-size:11px; color:var(--muted); margin:2px 0 0;">${item.price > 0 ? 'KES ' + item.price.toLocaleString() : 'Free'}</p>
                    </div>
                    <button onclick="removeFromCart('${item.id}')"
                        style="background:none; border:none; color:var(--muted); cursor:pointer; padding:4px 8px; font-size:11px; margin-left:8px; transition:color 0.15s;"
                        onmouseover="this.style.color='#e55'" onmouseout="this.style.color='var(--muted)'">
                        Remove
                    </button>`;
                container.appendChild(div);
            });
        }

        document.getElementById('totalDisplay').textContent = total > 0 ? `KES ${total.toLocaleString()}` : 'KES 0';
        document.getElementById('payBtn').textContent = total > 0 ? 'Pay & Unlock' : 'Unlock (Free)';
    }

    function openCheckout()  { document.getElementById('checkoutPanel').classList.remove('hidden'); }
    function closeCheckout() { document.getElementById('checkoutPanel').classList.add('hidden'); }

    async function initiateMpesaPayment() {
        if (!cart.length) return;
        const btn = document.getElementById('payBtn');
        btn.textContent = 'Processing...';
        btn.disabled = true;

        for (const item of cart) {
            await fetch('/api/record-purchase', {
                method: 'POST',
                body: JSON.stringify({ materialId: item.id })
            });
            if (item.fileUrl) {
                await downloadAsPdf('https://lasan-connect123.onrender.com' + item.fileUrl, item.title);
            }
        }

        cart = [];
        renderCart();
        closeCheckout();
        btn.textContent = 'Unlock Resources';
        btn.disabled = false;
    }

    // ── Helpers ───────────────────────────────────────────────────────────────
    async function downloadAsPdf(url, fileName) {
        if (!fileName.toLowerCase().endsWith('.pdf')) fileName += '.pdf';
        const res  = await fetch(url);
        const blob = await res.blob();
        const link = document.createElement('a');
        link.href  = URL.createObjectURL(blob);
        link.download = fileName;
        document.body.appendChild(link);
        link.click();
        document.body.removeChild(link);
    }

    function logoutPortalSession() { location.href = '/api/logout'; }

    document.getElementById('cartBtn').addEventListener('click', openCheckout);
    document.addEventListener('DOMContentLoaded', fetchStoreMaterials);
</script>
</body>
