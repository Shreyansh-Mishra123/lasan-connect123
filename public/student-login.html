<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Login | Lasan Portal</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="icon" type="image/png" href="1776759415-161570595069e73277f252e!favicon-512.png">
    <style>
        body { 
            font-family: 'Segoe UI', sans-serif; 
            background-color: #000; 
            color: #fff; 
            margin: 0; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            min-height: 100vh; 
        }
        .login-container { 
            position: relative; /* Essential for positioning the home button */
            width: 100%; 
            max-width: 400px; 
            padding: 2.5rem; 
            background: #111; 
            border: 1px solid #222; 
            border-radius: 10px; 
            text-align: center; 
            box-sizing: border-box;
        }

        /* Home Button Styling */
        .home-btn { 
            position: absolute; 
            top: 20px; 
            left: 20px; 
            color: #555; 
            text-decoration: none; 
            font-size: 0.8rem; 
            text-transform: uppercase; 
            transition: 0.3s; 
        }
        .home-btn:hover { color: #fff; }

        .icon-box { 
            width: 50px; 
            height: 50px; 
            background: #fff; 
            color: #000; 
            border-radius: 50%; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            margin: 0 auto 1.5rem; 
            font-size: 1.2rem; 
        }
        .header { margin-bottom: 2rem; }
        .header h1 { font-size: 1.5rem; margin-bottom: 0.5rem; }
        .header p { color: #666; font-size: 0.9rem; }
        
        .btn-google { 
            width: 100%; 
            padding: 14px; 
            border-radius: 5px; 
            border: none; 
            font-weight: bold; 
            cursor: pointer; 
            transition: 0.3s; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            background: #fff; 
            color: #000; 
            font-size: 0.9rem;
        }
        .btn-google:hover { background: #ccc; }
        
        .footer-link { margin-top: 2rem; font-size: 0.8rem; color: #666; }
        .footer-link a { color: #fff; text-decoration: underline; }
    </style>
</head>
<body>

    <div class="login-container">
        <a href="index.html" class="home-btn"><i class="fa-solid fa-house"></i> Home</a>

        <div class="icon-box"><i class="fa-solid fa-graduation-cap"></i></div>
        <div class="header">
            <h1>Lasan Revision Portal</h1>
            <p>Access your library securely via Google.</p>
        </div>

        <button onclick="window.location.href='http://localhost:5000/api/auth/google'" class="btn-google">
            <i class="fa-brands fa-google" style="margin-right: 8px;"></i> Continue with Google
        </button>

        <div class="footer-link">
            Don't have an account? <a href="signup.html">Create one here</a>
            <br><br>
            Are you an authorized educator? <a href="admin-login.html">Staff Access Console</a>
        </div>
    </div>

</body>
</html>
